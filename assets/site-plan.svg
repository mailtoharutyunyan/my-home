<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 600" font-family="'JetBrains Mono', ui-monospace, monospace">
  <rect width="520" height="600" fill="#ffffff"/>
  <rect x="10" y="10" width="500" height="580" fill="none" stroke="#8a9299" stroke-width="1.5"/>

  <!-- участок -->
  <rect x="100" y="90" width="320" height="400" fill="#f5f6f2" stroke="#1f5fbf" stroke-width="1.5"/>
  <!-- сетка двора (штриховка) -->
  <text x="260" y="170" fill="#5b6b57" font-size="13" text-anchor="middle" font-family="Inter, sans-serif">двор · парковка</text>

  <!-- дом -->
  <rect x="148" y="234" width="224" height="208" fill="#e7ebe6" stroke="#14202b" stroke-width="2.5"/>
  <rect x="160" y="246" width="200" height="184" fill="none" stroke="#8a9299" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="260" y="335" fill="#14202b" font-size="16" font-weight="700" text-anchor="middle" font-family="'Space Grotesk', sans-serif">ДОМ</text>
  <text x="260" y="356" fill="#14202b" font-size="12" text-anchor="middle">14 × 13 м</text>

  <!-- размерная линия низ (20 м) -->
  <line x1="100" y1="512" x2="420" y2="512" stroke="#1f5fbf" stroke-width="1"/>
  <line x1="100" y1="506" x2="100" y2="518" stroke="#1f5fbf" stroke-width="1"/>
  <line x1="420" y1="506" x2="420" y2="518" stroke="#1f5fbf" stroke-width="1"/>
  <rect x="238" y="503" width="44" height="16" fill="#ffffff"/>
  <text x="260" y="516" fill="#1f5fbf" font-size="12" text-anchor="middle">20 м</text>

  <!-- размерная линия право (25 м) -->
  <line x1="446" y1="90" x2="446" y2="490" stroke="#1f5fbf" stroke-width="1"/>
  <line x1="440" y1="90" x2="452" y2="90" stroke="#1f5fbf" stroke-width="1"/>
  <line x1="440" y1="490" x2="452" y2="490" stroke="#1f5fbf" stroke-width="1"/>
  <rect x="437" y="282" width="18" height="16" fill="#ffffff"/>
  <text x="446" y="294" fill="#1f5fbf" font-size="12" text-anchor="middle" transform="rotate(90,446,290)">25 м</text>

  <!-- отступы 3 м -->
  <text x="124" y="345" fill="#c8532a" font-size="11" text-anchor="middle">3.0</text>
  <text x="396" y="345" fill="#c8532a" font-size="11" text-anchor="middle">3.0</text>
  <text x="260" y="470" fill="#c8532a" font-size="11" text-anchor="middle">3.0</text>
  <text x="260" y="216" fill="#5b6b57" font-size="11" text-anchor="middle" font-family="Inter, sans-serif">↑ фасад / вход · 9 м двор</text>

  <!-- штамп -->
  <line x1="10" y1="548" x2="510" y2="548" stroke="#8a9299"/>
  <text x="24" y="570" fill="#14202b" font-size="13" font-weight="700" font-family="'Space Grotesk', sans-serif">ГЕНПЛАН</text>
  <text x="200" y="570" fill="#8a9299" font-size="11">участок 20×25 м · 182 м²/эт.</text>
  <text x="496" y="570" fill="#c8532a" font-size="12" text-anchor="end">М 1:200 · Л.01</text>
</svg>
